<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Lexicon</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<script>try{var t=JSON.parse(localStorage.getItem('lw_theme_v1'));if(t==='dark'||t==='light')document.documentElement.dataset.theme=t;}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Schibsted+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F0E8;
  --surface: #FFFFFF;
  --surface-2: #FBF8F2;
  --ink: #1C1A17;
  --muted: #756E63;
  --faint: #A8A093;
  --border: #E5DECF;
  --border-2: #EFE9DD;
  --accent: #E8552F;
  --accent-ink: #fff;
  --accent-soft: #FBE7DF;
  --danger: #C8392E;
  --shadow: 0 1px 2px rgba(40,30,15,.04), 0 12px 32px -12px rgba(40,30,15,.16);
  --shadow-card: 0 2px 6px rgba(40,30,15,.06), 0 30px 60px -22px rgba(40,30,15,.28);
  --radius: 16px;
  --ui: 'Schibsted Grotesk', system-ui, sans-serif;
  --serif: 'Newsreader', Georgia, serif;
}
html[data-theme="dark"] {
  --bg: #14120E;
  --surface: #211E18;
  --surface-2: #1B1813;
  --ink: #F2EDE3;
  --muted: #A29A8C;
  --faint: #6F685C;
  --border: #322D24;
  --border-2: #2A2620;
  --accent: #FF6A41;
  --accent-ink: #1a0e08;
  --accent-soft: #3A241B;
  --danger: #E6635A;
  --shadow: 0 1px 2px rgba(0,0,0,.3), 0 14px 36px -14px rgba(0,0,0,.6);
  --shadow-card: 0 2px 8px rgba(0,0,0,.35), 0 36px 70px -24px rgba(0,0,0,.7);
}
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; overflow-x: hidden; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--ui);
  -webkit-font-smoothing: antialiased;
}
.app, .topbar, .card-face, .grp, .chip, .btn, .input, .modal { transition: background-color .3s ease, border-color .3s ease; }
#root { min-height: 100%; }
button { font-family: inherit; cursor: pointer; }
::selection { background: var(--accent); color: var(--accent-ink); }

.app { min-height: 100dvh; display: flex; flex-direction: column; }

/* ---------- Top bar ---------- */
.topbar {
  position: sticky; top: 0; z-index: 20;
  display: flex; align-items: center; gap: 16px;
  padding: 14px clamp(16px, 4vw, 40px);
  background: color-mix(in srgb, var(--bg) 82%, transparent);
  backdrop-filter: blur(14px) saturate(1.2);
  border-bottom: 1px solid var(--border-2);
}
.brand { display: flex; align-items: center; gap: 9px; flex: 1; }
.brand-name { font-weight: 700; font-size: 18px; letter-spacing: -.02em; }

.menu-wrap { position: relative; flex: 0 0 auto; }
.menu-dropdown {
  position: absolute; top: calc(100% + 8px); right: 0; z-index: 30;
  display: flex; flex-direction: column; gap: 2px;
  min-width: 200px; padding: 8px;
  background: var(--surface); border: 1px solid var(--border-2);
  border-radius: 14px; box-shadow: var(--shadow);
}
.menu-item {
  display: flex; align-items: center; gap: 10px;
  border: 0; background: transparent; color: var(--ink);
  font-size: 14px; font-weight: 600; padding: 10px 12px; border-radius: 9px;
  text-align: left; width: 100%; transition: background .15s ease;
}
.menu-item:hover { background: var(--surface-2); }
.menu-item.on { background: var(--surface-2); color: var(--accent); }
.menu-sep { height: 1px; margin: 6px 4px; background: var(--border-2); }
.menu-sub { display: flex; flex-direction: column; gap: 2px; padding-left: 10px; }

/* ---------- Language select (first launch) ---------- */
.lang-select {
  min-height: 100dvh; display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.lang-select-card {
  width: 100%; max-width: 420px; text-align: center;
}
.lang-select-title { font-family: var(--serif); font-size: 28px; font-weight: 500; margin: 0 0 6px; color: var(--ink); }
.lang-select-sub { color: var(--muted); font-size: 14px; margin: 0 0 28px; }
.lang-select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.lang-opt {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  border: 1px solid var(--border); background: var(--surface);
  border-radius: 16px; padding: 22px 14px; transition: all .16s ease;
}
.lang-opt:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }
.lang-opt-flag { font-size: 32px; }
.lang-opt-name { font-weight: 600; font-size: 14.5px; color: var(--ink); }

.appfooter {
  text-align: center; color: var(--muted); font-size: 12px;
  padding: 12px clamp(16px, 4vw, 40px) 18px;
  border-top: 1px solid var(--border-2);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}

.view-wheel {
  align-self: stretch;
  display: flex; align-items: center; gap: 6px;
  overflow-x: auto; overflow-y: hidden;
  scroll-behavior: smooth;
  -ms-overflow-style: none; scrollbar-width: none;
  touch-action: pan-x;
  cursor: grab;
  -webkit-mask-image: linear-gradient(to right, transparent, #000 14%, #000 86%, transparent);
          mask-image: linear-gradient(to right, transparent, #000 14%, #000 86%, transparent);
}
.view-wheel:active { cursor: grabbing; }
.view-wheel::-webkit-scrollbar { display: none; }
/* spacer at each end so the first/last item can still center */
.view-wheel-pad { flex: 0 0 42%; }
.view-wheel-item {
  flex: 0 0 auto; padding: 6px 14px; border: 0; border-radius: 999px;
  background: transparent; color: var(--muted);
  font-size: 13px; font-weight: 600; white-space: nowrap;
  transition: color .18s ease, background .18s ease, transform .18s ease;
  user-select: none; -webkit-user-select: none;
}
.view-wheel-item:hover { color: var(--ink); }
.view-wheel-item.on {
  color: #fff; background: var(--accent); transform: scale(1.05);
}

.icon-btn {
  display: grid; place-items: center;
  width: 38px; height: 38px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--ink); transition: all .16s ease;
}
.icon-btn:hover { background: var(--surface-2); border-color: var(--border); transform: translateY(-1px); }
.icon-btn.sm { width: 32px; height: 32px; border-color: transparent; background: transparent; }
.icon-btn.sm:hover { background: var(--surface-2); }
.icon-btn.danger:hover { color: var(--danger); background: color-mix(in srgb, var(--danger) 10%, transparent); }

/* ---------- Content ---------- */
.content { flex: 1; width: 100%; max-width: 980px; margin: 0 auto; padding: clamp(20px, 4vw, 40px); }

/* ---------- Study ---------- */
.study { display: flex; flex-direction: column; align-items: center; gap: 26px; }
.category { display: flex; flex-direction: column; align-items: center; gap: 28px; }
.category .selector { width: 100%; max-width: 640px; margin: 0 auto; }
.selector { width: 100%; max-width: 640px; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.btn-cta-study { font-size: 15px; padding: 13px 22px; }

/* ---------- Reading (AI text) ---------- */
.reading { display: flex; flex-direction: column; align-items: center; gap: 24px; }

/* flip card holding settings (front) / generated text (back) */
.reading-scene { width: 100%; max-width: 720px; perspective: 1800px; }
.reading-inner {
  position: relative; display: grid; width: 100%;
  transform-style: preserve-3d;
  transition: transform .62s cubic-bezier(.2,.7,.2,1);
}
.reading-scene.is-flipped .reading-inner { transform: rotateY(180deg); }
.reading-face {
  grid-area: 1 / 1; width: 100%;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  transition: opacity 0s linear .31s;
}
.reading-back { transform: rotateY(180deg); }
.reading-scene:not(.is-flipped) .reading-back { opacity: 0; pointer-events: none; }
.reading-scene.is-flipped .reading-front { opacity: 0; pointer-events: none; }

.reading-controls {
  width: 100%; display: flex; flex-direction: column; gap: 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: clamp(16px, 3vw, 24px);
}
.reading-controls .seg { flex-wrap: wrap; }
.reading-controls .btn-cta-study { align-self: stretch; justify-content: center; }
.reading-result {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border); border-radius: 16px;
  padding: clamp(18px, 3.5vw, 30px);
}
.reading-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
.reading-head-main { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
.reading-title { font-size: 20px; font-weight: 700; margin: 0; color: var(--ink); }
.reading-meta { display: flex; align-items: center; gap: 8px; }
.reading-level {
  font-size: 12px; font-weight: 700; letter-spacing: .02em; padding: 2px 8px; border-radius: 999px;
  background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent);
}
.reading-counter { font-size: 12.5px; font-weight: 600; color: var(--muted); }
.reading-nav { display: flex; align-items: center; justify-content: center; gap: 14px; margin: 18px 0 4px; }
.reading-nav-btn {
  flex: 0 0 auto; width: 36px; height: 36px; border-radius: 999px; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--surface-2); color: var(--ink); border: 1px solid var(--border);
  transition: background-color .15s ease, color .15s ease, border-color .15s ease, opacity .15s ease;
}
.reading-nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.reading-nav-btn:disabled { opacity: .35; cursor: default; }
.reading-dots { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 7px; }
.reading-dot {
  width: 9px; height: 9px; border-radius: 999px; cursor: pointer; padding: 0;
  background: var(--surface-2); border: 1px solid var(--border);
  transition: background-color .15s ease, border-color .15s ease, transform .15s ease;
}
.reading-dot:hover { border-color: var(--accent); }
.reading-dot.on { background: var(--accent); border-color: var(--accent); transform: scale(1.25); }
.reading-bulb {
  flex: 0 0 auto; width: 38px; height: 38px; border-radius: 999px; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--surface-2); color: var(--muted); border: 1px solid var(--border);
  transition: background-color .15s ease, color .15s ease, border-color .15s ease;
}
.reading-bulb:hover { color: var(--ink); }
.reading-bulb[aria-pressed="true"] {
  background: var(--accent-soft); color: var(--accent); border-color: var(--accent);
}
.reading-text { font-size: 16px; line-height: 1.7; color: var(--ink); margin: 0; }
.reading-sentence { cursor: pointer; border-radius: 4px; transition: background-color .15s ease; }
.reading-sentence:hover { background: var(--surface-2); }
.reading-sentence.open { background: var(--accent-soft); }
.reading-sentence-ru {
  display: block; margin: 6px 0 10px; padding: 8px 12px;
  font-size: 14.5px; line-height: 1.6; color: var(--muted);
  background: var(--surface-2); border-left: 3px solid var(--accent); border-radius: 8px;
}
.reading-hl {
  background: #FFE58A; color: #4A3B00; border-radius: 3px; padding: 0 2px; font-weight: 600;
}
html[data-theme="dark"] .reading-hl { background: #7A6A1E; color: #FFF4C2; }
.reading-text-ru { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); color: var(--muted); }
.reading-actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 18px 0 0; }
.reading-words { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
.reading-word-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.reading-word-tag {
  font-size: 12.5px; font-weight: 600; padding: 4px 10px; border-radius: 999px; cursor: pointer;
  background: var(--surface-2); color: var(--muted); border: 1px solid var(--border);
  transition: background-color .15s ease, color .15s ease, border-color .15s ease;
}
.reading-word-tag.used { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
.reading-word-tag.active { background: #FFE58A; color: #4A3B00; border-color: #E8C84A; }
html[data-theme="dark"] .reading-word-tag.active { background: #7A6A1E; color: #FFF4C2; border-color: #A08A2A; }

.chip {
  display: inline-flex; align-items: center; gap: 8px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--ink); font-size: 13.5px; font-weight: 600;
  padding: 7px 13px; border-radius: 999px; transition: all .16s ease;
}
.chip:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
.chip-dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
.chip-count { color: var(--faint); font-size: 12px; font-variant-numeric: tabular-nums; }
.chip-check { color: var(--accent); margin-left: -2px; }
.chip-on { border-color: var(--accent); background: var(--accent-soft); }
.chip-on .chip-count { color: var(--accent); }
.chip-all { font-weight: 700; }
.chip-all.chip-on { color: var(--accent); }

/* ---------- Choice (multiple-choice quiz) ---------- */
.choice { display: flex; justify-content: center; width: 100%; padding: clamp(8px, 3vw, 24px) 0; }
.choice-card {
  width: min(480px, 100%); display: flex; flex-direction: column; align-items: center; gap: 26px;
  background: var(--surface); border: 1px solid var(--border-2); border-radius: 22px;
  box-shadow: var(--shadow-card); padding: 40px 30px; position: relative;
}
.choice-tag {
  position: absolute; top: 14px; left: 14px;
  display: inline-flex; align-items: center; gap: 6px;
  background: color-mix(in srgb, var(--surface) 86%, transparent);
  border: 1px solid var(--border-2); border-radius: 999px;
  padding: 4px 10px; font-size: 11.5px; font-weight: 600; color: var(--ink);
}
.choice-tag .dot { width: 7px; height: 7px; border-radius: 50%; }
.choice-tag-btn {
  z-index: 4; cursor: pointer; font-family: inherit; line-height: 1;
  transition: border-color .15s ease, background .15s ease, transform .1s ease;
}
.choice-tag-btn:hover { border-color: var(--accent, var(--ink)); background: color-mix(in srgb, var(--surface) 96%, transparent); }
.choice-tag-btn:active { transform: scale(.96); }
.choice-prompt-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 18px; width: 100%; }
.choice-prompt-row .card-speak { position: static; }
.choice-prompt { font-family: var(--serif); font-size: 34px; font-weight: 500; text-align: center; line-height: 1.15; overflow-wrap: break-word; }
.choice-ipa { font-family: var(--serif); font-style: italic; font-size: 16px; color: var(--muted); text-align: center; margin-top: -10px; }
.choice-options { display: flex; flex-direction: column; gap: 10px; width: 100%; }
.choice-opt {
  width: 100%; border: 1px solid var(--border); background: var(--surface-2); color: var(--ink);
  font-size: 15px; font-weight: 600; padding: 13px 16px; border-radius: 12px; text-align: left;
  transition: all .15s ease;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.choice-opt-label { flex: 1; }
.choice-opt .card-speak { position: static; flex: 0 0 auto; }
.choice-opt:hover:not(:disabled) { border-color: var(--accent); transform: translateY(-1px); }
.choice-opt:disabled { cursor: default; }
.choice-opt-correct { border-color: #5BA02E; background: color-mix(in srgb, #5BA02E 16%, var(--surface-2)); color: #5BA02E; }
.choice-opt-wrong { border-color: #D6453E; background: color-mix(in srgb, #D6453E 16%, var(--surface-2)); color: #D6453E; }

/* ---------- Fill (blank-the-word cards) ---------- */
.fill { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.fill-scene {
  width: min(440px, 88vw); height: 460px;
  perspective: 1600px; cursor: pointer; user-select: none;
  position: relative; touch-action: none; outline: none; -webkit-tap-highlight-color: transparent;
}
.fill-inner {
  position: relative; width: 100%; height: 100%;
  transform-style: preserve-3d; transition: transform .62s cubic-bezier(.2,.7,.2,1);
}
.fill-scene.is-flipped .fill-inner { transform: rotateY(180deg); }
.fill-face {
  position: absolute; inset: 0;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  border-radius: 22px; background: var(--surface);
  border: 1px solid var(--border-2); box-shadow: var(--shadow-card);
  overflow: hidden; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px; padding: 44px 30px; text-align: center;
  transition: opacity 0s linear .31s;
}
.fill-scene:not(.is-flipped) .fill-back { opacity: 0; pointer-events: none; }
.fill-scene.is-flipped .fill-front { opacity: 0; pointer-events: none; }
.fill-front .choice-tag { top: 14px; left: 14px; }
.fill-sentence {
  font-family: var(--serif); font-size: clamp(22px, 5vw, 30px); line-height: 1.5;
  color: var(--ink); margin: 0; overflow-wrap: break-word;
}
.fill-blank {
  display: inline-block; min-width: 84px; vertical-align: baseline;
  border-bottom: 3px solid var(--accent); margin: 0 4px;
}
.fill-sentence-tr {
  font-family: var(--serif); font-size: clamp(15px, 3.5vw, 19px); line-height: 1.45;
  color: var(--muted); margin: 0; padding-top: 14px;
  border-top: 1px solid var(--border-2); width: 80%;
}
.fill-back {
  transform: rotateY(180deg);
  background: linear-gradient(180deg, color-mix(in srgb, var(--hue, var(--accent)) 7%, var(--surface)), var(--surface));
}

/* ---------- Stage / card ---------- */
.stage { width: 100%; display: grid; place-items: center; min-height: 460px; position: relative; z-index: 0; }
.card-scene {
  width: min(380px, 86vw); height: 460px;
  perspective: 1600px; cursor: pointer; user-select: none;
  position: relative; touch-action: none;
  outline: none; -webkit-tap-highlight-color: transparent;
}
.card-scene.swipe-known, .card-scene.swipe-unknown, .card-scene.swipe-shuffle,
.card-scene.swipe-shuffle-hint, .card-scene.swipe-skip-hint, .card-scene.swipe-skip,
.fill-scene.swipe-known, .fill-scene.swipe-unknown, .fill-scene.swipe-shuffle,
.fill-scene.swipe-shuffle-hint, .fill-scene.swipe-skip-hint, .fill-scene.swipe-skip { position: relative; z-index: 30; }
.card-scene.swipe-known .card-face,
.fill-scene.swipe-known .fill-face { box-shadow: 0 0 0 3px #5BA02E, var(--shadow-card); }
.card-scene.swipe-unknown .card-face,
.fill-scene.swipe-unknown .fill-face { box-shadow: 0 0 0 3px #D6453E, var(--shadow-card); }
.card-scene.swipe-shuffle-hint .card-face,
.fill-scene.swipe-shuffle-hint .fill-face { box-shadow: 0 0 0 3px #3B82F6, var(--shadow-card); }
.card-scene.swipe-skip-hint .card-face,
.card-scene.swipe-skip .card-face,
.fill-scene.swipe-skip-hint .fill-face,
.fill-scene.swipe-skip .fill-face { box-shadow: 0 0 0 3px #9CA3AF, var(--shadow-card); }
.swipe-stamp {
  position: absolute; top: 25px; z-index: 5;
  font-size: 18px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
  padding: 8px 18px; border-radius: 999px; pointer-events: none;
}
.card-scene.swipe-known .swipe-stamp,
.fill-scene.swipe-known .swipe-stamp { left: 48px; color: #5BA02E; border: 2px solid #5BA02E; transform: rotate(-8deg); }
.card-scene.swipe-unknown .swipe-stamp,
.fill-scene.swipe-unknown .swipe-stamp { right: 48px; color: #D6453E; border: 2px solid #D6453E; transform: rotate(8deg); }
.swipe-stamp-shuffle {
  left: 50%; top: 47.25px; transform: translateX(-50%); color: var(--accent); border: 2px solid var(--accent);
  display: inline-flex; align-items: center; gap: 6px;
}
.swipe-stamp-skip {
  left: 50%; bottom: 18px; top: auto; transform: translateX(-50%); color: var(--accent); border: 2px solid var(--accent);
  font-size: 21.6px;
}

/* ---------- Shuffle animation ---------- */
.card-scene.swipe-shuffle .card-inner,
.fill-scene.swipe-shuffle .fill-inner { opacity: 0; transition: opacity .12s ease; }
.shuffle-fx {
  position: absolute; inset: 0; z-index: 6;
  display: grid; place-items: center;
  pointer-events: none;
}
.shuffle-card {
  position: absolute; width: 100%; height: 100%;
  border-radius: 22px; background: var(--surface);
  border: 1px solid var(--border-2); box-shadow: var(--shadow-card);
}
.shuffle-card.sc-1 { animation: shuffleCard1 .5s ease-in-out; }
.shuffle-card.sc-2 { animation: shuffleCard2 .5s ease-in-out .03s; }
.shuffle-card.sc-3 { animation: shuffleCard3 .5s ease-in-out .06s; }
.shuffle-icon {
  position: relative; z-index: 7; color: var(--accent);
  background: color-mix(in srgb, var(--surface) 88%, transparent);
  border: 1px solid var(--border-2); border-radius: 999px;
  padding: 12px; box-shadow: var(--shadow);
  animation: shuffleIcon .5s ease-in-out;
}
@keyframes shuffleCard1 {
  0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
  30% { transform: translate(-46px, -22px) rotate(-14deg); opacity: 1; }
  60% { transform: translate(40px, 14px) rotate(10deg); opacity: 1; }
  100% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
}
@keyframes shuffleCard2 {
  0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
  30% { transform: translate(48px, -16px) rotate(12deg); opacity: 1; }
  60% { transform: translate(-42px, 18px) rotate(-9deg); opacity: 1; }
  100% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
}
@keyframes shuffleCard3 {
  0% { transform: translate(0, 6px) rotate(0deg); opacity: 1; }
  30% { transform: translate(-10px, -34px) rotate(-5deg); opacity: 1; }
  60% { transform: translate(8px, 28px) rotate(6deg); opacity: 1; }
  100% { transform: translate(0, 6px) rotate(0deg); opacity: 0; }
}
@keyframes shuffleIcon {
  0% { transform: scale(.6) rotate(0deg); opacity: 0; }
  25% { transform: scale(1.1) rotate(90deg); opacity: 1; }
  75% { transform: scale(1) rotate(270deg); opacity: 1; }
  100% { transform: scale(.6) rotate(360deg); opacity: 0; }
}
.card-inner {
  position: relative; width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform .62s cubic-bezier(.2,.7,.2,1);
}
.card-scene.is-flipped .card-inner { transform: rotateY(180deg); }

.card-face {

  transition: opacity 0s linear .31s;
}
.card-scene:not(.is-flipped):not(.is-example) .card-back { opacity: 0; pointer-events: none; }
.card-scene.is-flipped:not(.is-example) .card-front { opacity: 0; pointer-events: none; }
.card-scene.is-example .card-front,
.card-scene.is-example .card-back { opacity: 0; pointer-events: none; }
.card-scene:not(.is-example) .card-example { opacity: 0; pointer-events: none; }
.card-front { padding: 0; }
.card-photo { height: 160px; flex: 0 0 auto; overflow: hidden; background: var(--surface-2); }
.card-photo-img { width: 100%; height: 100%; object-fit: cover; display: block; }
.photo-ph {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  background:
    radial-gradient(120% 80% at 50% 0%, color-mix(in srgb, var(--ph-hue) 22%, var(--surface)) 0%, var(--surface-2) 70%);
  color: color-mix(in srgb, var(--ph-hue) 55%, var(--muted));
}
.photo-ph-icon { opacity: .55; }
.photo-ph-label { font-size: 12px; font-weight: 600; letter-spacing: .04em; text-transform: lowercase; opacity: .7; }
.card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 6px; padding: 18px 24px; }
.card-word { font-family: var(--serif); font-size: 46px; font-weight: 500; letter-spacing: -.015em; line-height: 1.05; text-align: center; color: var(--ink); overflow-wrap: break-word; word-break: break-word; max-width: 100%; }
.card-ipa { font-family: var(--serif); font-style: italic; font-size: 19px; color: var(--muted); white-space: normal; text-align: center; overflow-wrap: break-word; max-width: 100%; }
.card-tag {
  position: absolute; top: 14px; left: 14px;
  display: inline-flex; align-items: center; gap: 6px;
  background: color-mix(in srgb, var(--surface) 86%, transparent);
  backdrop-filter: blur(6px);
  border: 1px solid var(--border-2); border-radius: 999px;
  padding: 4px 10px; font-size: 11.5px; font-weight: 600; color: var(--ink);
}
.card-tag .dot { width: 7px; height: 7px; border-radius: 50%; }
.card-tag-btn {
  z-index: 4; cursor: pointer; font-family: inherit; line-height: 1;
  transition: border-color .15s ease, background .15s ease, transform .1s ease;
}
.card-tag-btn:hover { border-color: var(--accent, var(--ink)); background: color-mix(in srgb, var(--surface) 96%, transparent); }
.card-tag-btn:active { transform: scale(.96); }
.card-bulb {
  position: absolute; top: 14px; right: 14px; z-index: 4;
  display: inline-flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 999px;
  background: color-mix(in srgb, var(--surface) 86%, transparent);
  backdrop-filter: blur(6px);
  border: 1px solid var(--border-2);

  transition: color .2s, border-color .2s, background-color .2s, transform .15s;
}
.card-bulb-on {
  color: #E8A93E; border-color: color-mix(in srgb, #E8A93E 40%, var(--border-2));

}
.card-bulb-on:hover { transform: scale(1.08); }
.card-speak {
  position: absolute; top: 14px; right: 54px; z-index: 4;
  display: inline-flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 999px;
  background: color-mix(in srgb, var(--surface) 86%, transparent);
  backdrop-filter: blur(6px);
  border: 1px solid var(--border-2);

  transition: color .2s, border-color .2s, background-color .2s, transform .15s;
}

.card-example {

/* back */
.card-back {
  transform: rotateY(180deg);
  align-items: center; justify-content: center; gap: 14px; padding: 40px 30px; text-align: center;

    linear-gradient(180deg, color-mix(in srgb, var(--hue) 7%, var(--surface)), var(--surface));
}
.back-label { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--faint); }

.modal-scrim {
